<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecionar Condomínio - SYNDRA</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>.custom-gradient { background: linear-gradient(135deg, #0d9488, #0f766e); }</style>
</head>
<body class="bg-base-200 min-h-screen">

    <!-- Navbar -->
    <div class="navbar custom-gradient text-primary-content shadow-lg px-8">
        <div class="flex-1">
            <span class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-robot"></i> SYNDRA SaaS
            </span>
        </div>
        <div class="flex-none gap-2">
            <span class="text-sm mr-4">Olá, <strong>{{ user.name }}</strong></span>
            <a href="/admin/logout" class="btn btn-sm btn-ghost text-white border border-white/30">
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </a>
        </div>
    </div>

    <div class="container mx-auto p-8 max-w-4xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold mb-2">Selecione o Condomínio</h1>
            <p class="text-gray-500">Escolha qual condomínio deseja gerenciar</p>
        </div>

        {% if message %}
        <div role="alert" class="alert alert-success mb-6">
            <i class="fa-solid fa-circle-check"></i>
            <span>{{ message }}</span>
        </div>
        {% endif %}

        <!-- Grid de Condomínios -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
            {% for condo in condos %}
            <form action="/admin/select-condo" method="POST">
                <input type="hidden" name="condo_id" value="{{ condo.id }}">
                <button type="submit" class="card bg-base-100 shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all duration-200 w-full text-left cursor-pointer border-2 border-transparent hover:border-teal-500">
                    <div class="card-body">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-12 h-12 rounded-full custom-gradient flex items-center justify-center text-white text-xl shadow">
                                <i class="fa-solid fa-building"></i>
                            </div>
                            <div>
                                <h2 class="font-bold text-lg leading-tight">{{ condo.name }}</h2>
                                <span class="badge badge-sm {% if condo.active %}badge-success{% else %}badge-error{% endif %}">
                                    {% if condo.active %}Ativo{% else %}Inativo{% endif %}
                                </span>
                            </div>
                        </div>
                        <div class="text-sm text-gray-500 space-y-1">
                            <div><i class="fa-solid fa-location-dot w-4"></i> {{ condo.address or 'Endereço não informado' }}</div>
                            <div><i class="fa-brands fa-whatsapp w-4 text-green-500"></i> {{ condo.evolution_instance or 'Instância não configurada' }}</div>
                        </div>
                    </div>
                </button>
            </form>
            {% else %}
            <div class="col-span-3 text-center py-12 text-gray-400">
                <i class="fa-solid fa-building-circle-xmark text-5xl mb-4"></i>
                <p class="text-lg">Nenhum condomínio cadastrado ainda.</p>
            </div>
            {% endfor %}
        </div>

        <!-- Botão Novo Condomínio -->
        <div class="text-center">
            <a href="/admin/condos/new" class="btn btn-primary custom-gradient text-white border-none gap-2">
                <i class="fa-solid fa-plus"></i> Cadastrar Novo Condomínio
            </a>
        </div>
    </div>
</body>
</html>
